global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8889']

  # The app pushes metrics via OTLP to the collector; collector exposes them at :8889
  # No direct /metrics endpoint on the app itself
